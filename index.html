<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Premium Access</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      height: 100vh;
      margin: 0;
    }

    .popup-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .popup-box {
      background: #fff;
      padding: 22px 26px;
      border-radius: 12px;
      width: 90%;
      max-width: 400px;
      text-align: center;
      position: relative;
      box-shadow: 0 0 25px rgba(0,0,0,0.35);
      animation: fadeIn 0.25s ease-in-out;
    }

    .popup-box h3 {
      margin-top: 0;
      color: #ff4d4d;
      font-size: 22px;
    }

    .popup-box p {
      font-size: 16px;
      color: #333;
    }

    .popup-close {
      position: absolute;
      top: 10px;
      right: 14px;
      font-size: 20px;
      cursor: pointer;
      font-weight: bold;
      color: #999;
    }

    .popup-close:hover {
      color: #000;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to   { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>

  <!-- Auto Popup -->
  <div class="popup-overlay" id="popup">
    <div class="popup-box">
      <span class="popup-close" onclick="closePopup()">✖</span>
      <h3>Access Denied</h3>
      <p>You are not a premium user.</p>
    </div>
  </div>

  <script>
    function closePopup() {
      window.location.href = "index.html"; // homepage သို့ ပြန်ပို့
    }
  </script>

</body>
</html>

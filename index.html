<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Access</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
        }

        /* Overlay - ဗဟိုကျစေရန် Flexbox သုံးထားသည် */
        .popup-overlay {
            position: fixed;
            top: 0; 
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            padding: 20px; /* Mobile မှာ ဘေးကပ်မနေစေရန် */
        }

        /* Box */
        .popup-box {
            background: #fff;
            padding: 30px 20px;
            border-radius: 20px;
            width: 100%;
            max-width: 380px; /* Desktop အတွက် အကျယ် */
            text-align: center;
            position: relative;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .popup-close {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 20px;
            cursor: pointer;
            color: #ccc;
            line-height: 1;
        }

        .popup-close:hover {
            color: #333;
        }

        .popup-box h3 {
            margin: 10px 0;
            color: #e63946;
            font-size: 24px;
        }

        .popup-box p {
            font-size: 16px;
            color: #555;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        /* Buttons Layout */
        .popup-actions {
            display: flex;
            flex-direction: column; /* Mobile မှာ ခလုတ်ကို အပေါ်အောက် ထားမည် */
            gap: 12px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: transform 0.2s, opacity 0.2s;
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff4b2b, #ff416c);
            color: #fff;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #444;
        }

        /* Tablet နှင့် Desktop အတွက် ခလုတ်ကို ဘေးတိုက်ပြောင်းမည် */
        @media (min-width: 400px) {
            .popup-actions {
                flex-direction: row;
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
    </style>
</head>

<body>

<div class="popup-overlay">
    <div class="popup-box">
        <span class="popup-close" onclick="goHome()">✖</span>
        
        <div style="font-size: 50px; margin-bottom: 10px;">🚫</div>

        <h3>Access Denied</h3>
        <p>This content is for premium users only. Please upgrade your account to continue.</p>

        <div class="popup-actions">
            <button class="btn btn-secondary" onclick="goHome()">Back Home</button>
            <button class="btn btn-primary" onclick="goVIP()">Get VIP Access</button>
        </div>
    </div>
</div>

<script>
    function goHome() {
        window.location.href = "https://kawaiient.xyz";
    }

    function goVIP() {
        window.location.href = "member2.html"; 
    }

    // ESC key နှိပ်ရင် Home ပြန်မယ်
    document.addEventListener("keydown", function(e){
        if(e.key === "Escape") goHome();
    });
</script>

</body>
</html>

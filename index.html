<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Premium Access</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
}

/* Overlay */
.popup-overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.75);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  padding: 15px;
}

/* Box */
.popup-box {
  background: #fff;
  padding: 25px 20px;
  border-radius: 16px;
  width: 100%;
  max-width: 400px;
  text-align: center;
  position: relative;
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  animation: fadeIn 0.3s ease;
}

.popup-close {
  position: absolute;
  top: 10px;
  right: 15px;
  font-size: 18px;
  cursor: pointer;
  color: #aaa;
}

.popup-close:hover {
  color: #000;
}

.popup-box h3 {
  margin-top: 10px;
  color: #ff3b3b;
  font-size: 22px;
}

.popup-box p {
  font-size: 15px;
  color: #444;
  margin: 15px 0 20px;
}

/* Buttons */
.popup-actions {
  display: flex;
  gap: 10px;
  flex-direction: column;
}

@media (min-width: 500px) {
  .popup-actions {
    flex-direction: row;
  }
}

.btn {
  flex: 1;
  padding: 12px;
  border-radius: 40px;
  border: none;
  cursor: pointer;
  font-size: 14px;
  font-weight: bold;
}

.btn-primary {
  background: linear-gradient(45deg, #ff0000, #b30000);
  color: #fff;
}

.btn-secondary {
  background: #eee;
  color: #333;
}

@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.85); }
  to { opacity: 1; transform: scale(1); }
}
</style>
</head>

<body>

<div class="popup-overlay">
  <div class="popup-box">

    <span class="popup-close" onclick="goHome()">✖</span>

    <h3>Access Denied</h3>
    <p>You are not a premium user.</p>

    <div class="popup-actions">
      <button class="btn btn-primary" onclick="goVIP()">Get VIP Access</button>
      <button class="btn btn-secondary" onclick="goHome()">Back Home</button>
    </div>

  </div>
</div>

<script>
function goHome() {
  window.location.href = "https://kawaiient.xyz";
}

function goVIP() {
  window.location.href = "member.html"; // same repo ထဲမှာရှိရင် OK
}

/* ESC key */
document.addEventListener("keydown", function(e){
  if(e.key === "Escape") goHome();
});
</script>

</body>
</html>
